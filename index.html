<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta property="og:title" content="서진성 & 김성은 결혼합니다">
    <meta property="og:description" content="2026년 11월 15일, 저희의 시작을 축복해주세요.">
    <meta property="og:image" content="https://zsoz11111-hub.github.io/wedding/thumb.jpg">
    <title>모바일 청첩장</title>
    
    <style>
        @import url("https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.min.css");
        @import url('https://fonts.googleapis.com/css2?family=Great+Vibes&family=Noto+Serif+KR:wght@400;500;600;700&display=swap');

        @font-face {
            font-family: 'GyeonggiBatang';
            src: url('https://cdn.jsdelivr.net/gh/projectnoonnu/noonfonts_one@1.0/GyeonggiBatang.woff') format('woff');
            font-weight: normal; font-style: normal; font-display: swap;
        }

        :root { --main-color: #f7cac9; --bg-color: #ffffff; --text-color: #333333; --gray-text: #666666; }
        * { box-sizing: border-box; }
        body { margin: 0; padding: 0; font-family: 'GyeonggiBatang', serif; background-color: #f5f5f5; color: var(--text-color); line-height: 1.6; overflow-x: hidden; }

        .container { max-width: 500px; margin: 0 auto; background-color: var(--bg-color); min-height: 100vh; box-shadow: 0 0 15px rgba(0,0,0,0.05); position: relative; padding-bottom: 60px; }

        /* 메인 커버: 사진 잘림 방지 (contain) */
        .cover {
            position: relative; width: 100%; height: 100vh;
            background-image: url('main.jpg');
            background-size: contain; 
            background-repeat: no-repeat;
            background-position: center center; 
            background-color: #dfdfdf; 
            display: flex; flex-direction: column; justify-content: flex-end;
            padding-bottom: 80px; text-align: center; color: #fff; text-shadow: 1px 1px 10px rgba(0,0,0,0.5);
        }
        .cover-title { display: block; width: calc(100% - 32px); max-width: 460px; margin: 0 auto 24px; padding: 0 4px; font-family: 'Great Vibes', cursive; font-size: clamp(2.15rem, 8.8vw, 2.85rem); font-weight: 400; text-align: center; }
        .cover-names { font-family: 'Noto Serif KR', serif; font-size: 2rem; font-weight: 600; margin-bottom: 24px; }
        .cover-date { font-family: 'Noto Serif KR', serif; font-size: 1.08rem; }
        .cover-place { font-family: 'Noto Serif KR', serif; font-size: 1.02rem; margin-top: 2px; }

        .section { padding: 50px 20px; text-align: center; border-bottom: 1px solid #eee; }
        .sec-title { color: var(--main-color); font-size: 1.1rem; font-weight: bold; margin-bottom: 25px; font-family: 'Pretendard', sans-serif; }
        .greeting { font-size: 0.95rem; color: var(--gray-text); line-height: 2.2; margin-bottom: 30px;}
        .highlight-name { font-weight: bold; color: #000; font-size: 1.1rem; }
        
        /* 혼주 소개 - 중앙 정렬 적용 */
        .family-card { max-width: 390px; margin: 0 auto; padding: 25px 22px; border: 1px solid #eee; border-radius: 14px; background: #fff; }
        .family-row { display: flex; justify-content: center; align-items: center; width: 100%; padding: 18px 0; }
        .family-row + .family-row { border-top: 1px solid #eee; }
        .family-side { flex: 0 0 70px; font-family: 'Pretendard', sans-serif; font-size: 0.85rem; font-weight: 700; color: #d99692; text-align: center; margin-right: 15px; }
        .family-text { flex: 0 0 170px; text-align: center; display: flex; flex-direction: column; align-items: center; justify-content: center; font-size: 0.93rem; color: #555; }
        .family-text strong { color: #111; font-size: 1.12rem; font-weight: 700; margin-top: 2px; }
        .family-parent { color: #777; font-size: 0.85rem; }

        /* 갤러리 그리드 */
        .gallery-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 5px; }
        .gallery-img { width: 100%; aspect-ratio: 1 / 1; object-fit: cover; cursor: pointer; }

        /* 라이트박스 */
        .lightbox { display: none; position: fixed; z-index: 1000; left: 0; top: 0; width: 100vw; height: 100dvh; background-color: #050505; flex-direction: column; justify-content: space-between; align-items: center; }
        .close-lightbox { position: absolute; top: 15px; right: 20px; color: #fff; font-size: 40px; font-weight: bold; cursor: pointer; z-index: 1005; }
        .arrow { cursor: pointer; position: absolute; top: 45%; transform: translateY(-50%); color: white; font-weight: bold; font-size: 35px; padding: 15px; z-index: 1005; }
        .prev { left: 5px; } .next { right: 5px; }
        
        .lightbox-content { flex: 1; display: flex; align-items: center; justify-content: center; width: 100vw; height: calc(100dvh - 150px); object-fit: contain; margin: auto; }
        .lightbox-content.portrait { width: 100vw !important; aspect-ratio: 3 / 4 !important; height: auto !important; max-height: calc(100dvh - 160px) !important; object-fit: cover !important; object-position: center center !important; }
        
        .lightbox-thumb-strip { width: 100%; min-height: 150px; background: #111; display: flex; align-items: center; gap: 12px; padding: 15px 10px; overflow-x: auto; border-top: 1px solid #222; }
        .lightbox-thumb { flex: 0 0 115px; width: 115px; height: 115px; border: 3px solid transparent; border-radius: 12px; cursor: pointer; background: transparent; }
        .lightbox-thumb.active { border-color: #f7cac9; }
        .lightbox-thumb img { width: 100%; height: 100%; object-fit: cover; border-radius: 9px; }
    </style>
</head>
<body>

<div class="container">
    <div class="cover">
        <div class="cover-title">Wedding Invitation</div>
        <div class="cover-names">서진성 · 김성은</div>
        <div class="cover-date">2026년 11월 15일 일요일 낮 12:00</div>
        <div class="cover-place">글로리아 웨딩홀 3층 비스타홀</div>
    </div>

    <div class="section">
        <div class="sec-title">FAMILY</div>
        <div class="family-card">
            <div class="family-row">
                <div class="family-side">GROOM</div>
                <div class="family-text">
                    <div class="family-parent">서경남 · 김미례의 아들</div>
                    <div><strong>서진성</strong></div>
                </div>
            </div>
            <div class="family-row">
                <div class="family-side">BRIDE</div>
                <div class="family-text">
                    <div class="family-parent">김민기 · 이미현의 딸</div>
                    <div><strong>김성은</strong></div>
                </div>
            </div>
        </div>
    </div>

    <div class="section">
        <div class="sec-title">GALLERY</div>
        <div class="gallery-grid">
            <img src="photo1.jpg" class="gallery-img">
            <img src="photo2.jpg" class="gallery-img">
            <img src="photo3.jpg" class="gallery-img">
            <img src="photo4.jpg" class="gallery-img">
            <img src="photo5.jpg" class="gallery-img">
            <img src="photo6.jpg" class="gallery-img">
            <img src="photo7.jpg" class="gallery-img">
            <img src="photo8.jpg" class="gallery-img">
            <img src="photo9.jpg" class="gallery-img">
        </div>
    </div>
</div>

<div id="myLightbox" class="lightbox">
    <span class="close-lightbox" onclick="closePhoto()">&times;</span>
    <a class="arrow prev" onclick="changeImage(-1)">&#10094;</a>
    <img class="lightbox-content" id="img01">
    <a class="arrow next" onclick="changeImage(1)">&#10095;</a>
    <div class="lightbox-thumb-strip">
        <button type="button" class="lightbox-thumb active" data-index="0"><img src="photo1.jpg"></button>
        <button type="button" class="lightbox-thumb" data-index="1"><img src="photo2.jpg"></button>
        <button type="button" class="lightbox-thumb" data-index="2"><img src="photo3.jpg"></button>
        <button type="button" class="lightbox-thumb" data-index="3"><img src="photo4.jpg"></button>
        <button type="button" class="lightbox-thumb" data-index="4"><img src="photo5.jpg"></button>
        <button type="button" class="lightbox-thumb" data-index="5"><img src="photo6.jpg"></button>
        <button type="button" class="lightbox-thumb" data-index="6"><img src="photo7.jpg"></button>
        <button type="button" class="lightbox-thumb" data-index="7"><img src="photo8.jpg"></button>
        <button type="button" class="lightbox-thumb" data-index="8"><img src="photo9.jpg"></button>
    </div>
</div>

<script>
    const lightbox = document.getElementById("myLightbox");
    const lightboxImg = document.getElementById("img01");
    const galleryImages = Array.from(document.querySelectorAll(".gallery-img"));
    let currentIndex = 0;

    function applyOrientationClass() {
        lightboxImg.classList.remove("portrait", "landscape", "square");
        if (lightboxImg.naturalHeight > lightboxImg.naturalWidth) lightboxImg.classList.add("portrait");
        else if (lightboxImg.naturalWidth > lightboxImg.naturalHeight) lightboxImg.classList.add("landscape");
        else lightboxImg.classList.add("square");
    }

    function openGallery(index) {
        currentIndex = index;
        lightboxImg.onload = applyOrientationClass;
        lightboxImg.src = galleryImages[index].src;
        if (lightboxImg.complete) applyOrientationClass();
        lightbox.style.display = "flex";
    }

    function closePhoto() { lightbox.style.display = "none"; }

    function changeImage(direction) {
        currentIndex = (currentIndex + direction + galleryImages.length) % galleryImages.length;
        lightboxImg.src = galleryImages[currentIndex].src;
        applyOrientationClass();
    }

    galleryImages.forEach((img, index) => img.addEventListener("click", () => openGallery(index)));
</script>
</body>
</html>
